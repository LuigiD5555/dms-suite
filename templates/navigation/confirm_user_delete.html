{% extends 'base.html' %}

{% block content %}
  <h1>Delete User</h1>
  <p>Are you sure you want to delete this user?</p>
  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="selected_users" value="{{ selected_user_ids|join:',' }}">
    <button type="submit" name="confirm_delete">Delete</button>
    <a href="{% url 'usuarios' %}">Cancel</a>
  </form>
{% endblock %}
