{% extends 'base.html' %}

{% block content %}
  <h1>Delete Group</h1>
  <p>Are you sure you want to delete this group?</p>
  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="selected_groups" value="{{ selected_group_ids|join:',' }}">
    <button type="submit" name="confirm_delete">Delete</button>
    <a href="{% url 'grupos' %}">Cancel</a>
  </form>
{% endblock %}
